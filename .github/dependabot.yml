version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      typescript-types:
        patterns:
          - '@types/*'
      eslint:
        patterns:
          - 'eslint*'
          - '@eslint/*'
      tailwind:
        patterns:
          - 'tailwindcss*'
          - '@tailwindcss/*'
          - 'prettier-plugin-tailwindcss'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
